name: Desktop release builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  mac-m4:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: npm ci
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: npm run check
      - run: npm run desktop:dist:mac-m4
      - run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "$HOME/.skillops/builds/wails/mac-arm64/SkillOps Local.app" release/SkillOps-Local-mac-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: skillops-local-mac-arm64
          path: |
            release/SkillOps-Local-mac-arm64.zip
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: npm ci
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: npm run check
      - run: npm run desktop:dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: skillops-local-windows-x64
          path: |
            wails/build/bin/**
          if-no-files-found: error
